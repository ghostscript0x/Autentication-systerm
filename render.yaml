# =============================================================================
# Render Blueprint — Infrastructure as Code
# =============================================================================
# Deploy by connecting your GitHub repo to Render Dashboard
# or via the Render CLI:
#   render blueprint launch
# =============================================================================

services:
  # ── Django Web Service ──────────────────────────────────────────────
  - type: web
    name: authsystem
    runtime: python
    region: oregon
    plan: free
    buildCommand: |
      pip install -r requirements.txt &&
      python manage.py collectstatic --noinput &&
      python manage.py migrate
    startCommand: >
      gunicorn authentication_project.wsgi:application
      --workers=2
      --worker-class=sync
      --timeout=120
      --access-logfile -
      --error-logfile -
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: DJANGO_SETTINGS_MODULE
        value: authentication_project.settings
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com,localhost,127.0.0.1"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com,http://localhost:8000"
      - key: DATABASE_URL
        fromDatabase:
          name: authsystem-db
          property: connectionString
      - key: CLOUDINARY_URL
        sync: false  # set manually in dashboard
      - key: EMAIL_BACKEND
        value: "django.core.mail.backends.smtp.EmailBackend"
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USE_TLS
        value: "True"
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false

  # ── PostgreSQL Database ─────────────────────────────────────────────
  - type: postgresql
    name: authsystem-db
    region: oregon
    plan: free
    ipAllowList: []  # allow only from internal services

# ── Post-deploy notes ─────────────────────────────────────────────────
# After first deploy, set these in Render Dashboard:
#   CLOUDINARY_URL  → cloudinary://api_key:api_secret@cloud_name
#   EMAIL_HOST      → smtp.gmail.com (or your provider)
#   EMAIL_HOST_USER → your@email.com
#   EMAIL_HOST_PASSWORD → your app password
#   DEFAULT_FROM_EMAIL → noreply@yourdomain.com

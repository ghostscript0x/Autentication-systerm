# =============================================================================
# Render Blueprint — Infrastructure as Code
# =============================================================================
# Deploy by connecting your GitHub repo to Render Dashboard
# or via the Render CLI:
#   render blueprint launch
#
# ⚠️  Free Postgres cannot be provisioned via Blueprint.
#     After the web service deploys, do this manually in the dashboard:
#       1. Render Dashboard → New Postgres → create free database
#       2. Copy its Internal Connection String
#       3. Paste as the DATABASE_URL env var in your web service
# =============================================================================

services:
  # ── Django Web Service ──────────────────────────────────────────────
  - type: web
    name: authsystem
    runtime: python
    region: oregon
    plan: free
    buildCommand: |
      pip install -r requirements.txt &&
      python manage.py collectstatic --noinput &&
      python manage.py migrate
    startCommand: >
      gunicorn authentication_project.wsgi:application
      --workers=2
      --worker-class=sync
      --timeout=120
      --access-logfile -
      --error-logfile -
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: DJANGO_SETTINGS_MODULE
        value: authentication_project.settings
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com,localhost,127.0.0.1"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com,http://localhost:8000"
      - key: DATABASE_URL
        sync: false  # set manually after creating Postgres DB in dashboard
      - key: CLOUDINARY_URL
        sync: false
      - key: EMAIL_BACKEND
        value: "django.core.mail.backends.smtp.EmailBackend"
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USE_TLS
        value: "True"
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false

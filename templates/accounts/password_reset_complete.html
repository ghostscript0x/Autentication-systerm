{% extends 'base.html' %}
{% load static %}

{% block title %}Password Updated &mdash; AuthSystem{% endblock %}

{% block content %}
<div class="min-h-[calc(100vh-4rem)] flex items-center justify-center px-4 py-12" data-track-cursor>
    <div class="gradient-blob"></div>

    <div class="relative z-10 w-full max-w-md anim-scale-in">
        <div class="relative overflow-hidden rounded-2xl border border-white/10 bg-dark-800/80 backdrop-blur-2xl p-8 sm:p-10 text-center">
            <div class="absolute -top-20 -right-20 w-40 h-40 bg-emerald-500/10 rounded-full blur-3xl"></div>

            <div class="relative z-10">
                <span class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-emerald-500/20 text-emerald-400 mb-6">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                </span>
                <h1 class="text-2xl font-bold text-white">Password Updated</h1>
                <p class="mt-2 text-slate-400 text-sm leading-relaxed">
                    Your password has been successfully changed. You can now log in with your new password.
                </p>

                <div class="mt-8">
                    <a href="{% url 'accounts:login' %}" class="inline-flex items-center justify-center w-full rounded-xl bg-gradient-to-r from-indigo-600 to-purple-600 px-6 py-3 text-sm font-semibold text-white shadow-xl shadow-indigo-600/30 hover:from-indigo-500 hover:to-purple-500 transition-all duration-300">
                        Log In
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
